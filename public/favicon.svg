<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Neon pink gradient for scoop -->
    <linearGradient id="scoopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6EC7"/>
      <stop offset="100%" style="stop-color:#C026D3"/>
    </linearGradient>
    <!-- Neon blue gradient for cone -->
    <linearGradient id="coneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <!-- Dark background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1A0F1F"/>
      <stop offset="100%" style="stop-color:#0A050F"/>
    </radialGradient>
    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>
  <!-- Neon pink outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#FF6EC7" stroke-width="1.5" opacity="0.8" filter="url(#neonGlow)"/>
  <!-- Neon blue inner ring -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#22D3EE" stroke-width="0.8" opacity="0.5"/>
  
  <!-- Ice cream scoop (neon pink) -->
  <g filter="url(#neonGlow)">
    <circle cx="32" cy="22" r="11" fill="url(#scoopGrad)" opacity="0.95"/>
    <!-- Scoop highlight -->
    <ellipse cx="29" cy="19" rx="3" ry="2" fill="#FFFFFF" opacity="0.5"/>
    <!-- Cherry on top -->
    <circle cx="32" cy="10" r="2.5" fill="#EF4444"/>
    <path d="M32 7.5 Q33 5 34.5 5" stroke="#22C55E" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Waffle cone (neon blue) -->
  <g filter="url(#neonGlow)">
    <path d="M22 32 L42 32 L32 56 Z" fill="url(#coneGrad)" opacity="0.9"/>
    <!-- Waffle pattern lines -->
    <line x1="26" y1="38" x2="38" y2="38" stroke="#0A050F" stroke-width="0.8" opacity="0.6"/>
    <line x1="28" y1="44" x2="36" y2="44" stroke="#0A050F" stroke-width="0.8" opacity="0.6"/>
    <line x1="30" y1="50" x2="34" y2="50" stroke="#0A050F" stroke-width="0.8" opacity="0.6"/>
    <!-- Diagonal waffle lines -->
    <line x1="27" y1="34" x2="33" y2="54" stroke="#0A050F" stroke-width="0.6" opacity="0.4"/>
    <line x1="37" y1="34" x2="31" y2="54" stroke="#0A050F" stroke-width="0.6" opacity="0.4"/>
  </g>
  
  <!-- Sprinkles on scoop -->
  <g opacity="0.9">
    <rect x="27" y="18" width="2" height="0.8" rx="0.4" fill="#FBBF24" transform="rotate(30 28 18.4)"/>
    <rect x="34" y="16" width="2" height="0.8" rx="0.4" fill="#22C55E" transform="rotate(-20 35 16.4)"/>
    <rect x="30" y="24" width="2" height="0.8" rx="0.4" fill="#3B82F6" transform="rotate(60 31 24.4)"/>
    <rect x="36" y="22" width="2" height="0.8" rx="0.4" fill="#EF4444" transform="rotate(45 37 22.4)"/>
  </g>
</svg>
